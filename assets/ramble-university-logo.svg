<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Ramble University Logo</title>
  <desc id="desc">Ramble University crest and wordmark in navy, parchment, moss green, and antique gold.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset="0.55" stop-color="#dfe8dd"/>
      <stop offset="1" stop-color="#b9c8bc"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f2f3e"/>
      <stop offset="1" stop-color="#071b2a"/>
    </linearGradient>
    <style>
      .navy{fill:#071b2a}.gold{fill:#b79a68}.cream{fill:#fbf7ef}.green{fill:#2f4a37}.moss{fill:#5f7464}.line{stroke:#b79a68;stroke-width:7;stroke-linecap:round}.thin{stroke:#071b2a;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.word{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:.22em}.sub{font-family:Georgia,'Times New Roman',serif;font-style:italic;letter-spacing:.05em}.sign{font-family:Arial,Helvetica,sans-serif;font-weight:700;letter-spacing:.06em}
    </style>
  </defs>
  <rect width="1200" height="420" fill="#fbf7ef"/>
  <g transform="translate(80 40)">
